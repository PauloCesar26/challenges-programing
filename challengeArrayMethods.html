        function createCleanName(path){
            const fileName = path.split("/").pop();

            const indexLastPoint = fileName.lastIndexOf(".");
            const name = fileName.slice(0, indexLastPoint);
            const extension = fileName.slice(indexLastPoint);

            return `File: ${name} | Extension: ${extension}`;
        }
